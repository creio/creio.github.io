# Default config
tabWidth: 4
endOfLine: "auto"
singleQuote: true
printWidth: 100000
trailingComma: "none"
bracketSameLine: true
quoteProps: "consistent"
experimentalTernaries: true

# Overrided config
overrides:
  - files: ["*.md", "*.json", "*.yaml", "*.yml"]
    options:
      tabWidth: 2
      singleQuote: false
  - files: ["*.scss"]
    options:
      tabWidth: 2
      singleQuote: false
