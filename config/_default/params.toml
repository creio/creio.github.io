description = "Personal website & blog. Web developer & linux enthusiast."
copyRight = "Copyright (c) @creio"
email = ""

ogLocale = "ru_RU"
languageTag = "ru"

yandexVerification = "16c69e69225504ca"

## Sitelinks Search Box
siteLinksSearchBox = false
## Chrome Browser
themeColor = "#4b64b4"

## Alert
alert = true
alertDismissable = true
alertText = '<a target="_blank" rel="nofollow noopener noreferrer" class="alert-link stretched-link fw-normal" href="https://go.2038.pro/8aa17c9fd9fc0371?erid=LdtCK4uVh&m=6">Топовые IT курсы с трудоустройством.</a>'

## Edit Page
# repoHost [Github | Gitea | GitLab | Bitbucket | BitbucketServer ] is used for building the edit link based on git hoster
repoHost = "GitHub"
docsRepo = "https://github.com/creio/creio.github.io"
docsRepoBranch = "main"
docsRepoSubPath = "content"
editPage = true
lastMod = true

footer = 'Powered by <a class="text-muted" target="_blank" rel="nofollow noopener noreferrer" href="https://www.netlify.com/">Netlify</a>, <a class="text-muted" target="_blank" rel="nofollow noopener noreferrer" href="https://gohugo.io/">Hugo</a>, fork <a class="text-muted" target="_blank" rel="nofollow noopener noreferrer" href="https://getdoks.org/">Doks</a> | <a class="text-muted" target="_blank" rel="nofollow noopener noreferrer" href="https://cloud.umami.is/share/UrYcvYQYoCSNcee4/creio.github.io">Analytics</a>'


## Open Graph
images = ["cover.png"]

[social]
  twitter = "creio"
  # facebook_admin = ""

## SEO (@thulite/seo)
[seo]
  [seo.title]
    separator = "|"
    suffix = "Alex Creio"
  [seo.description]
    summaryFallback = "" # "" (default)
  [seo.description.length]
    errorlevel = "ignore" # warning (default), error, or ignore
    min = 110
    max = 160
  [seo.favicons]
    icon = "favicon.png" # favicon.png (default)
    svgIcon = "favicon.svg" # favicon.svg (default)
  [seo.schemas]
    type = "Person" # Organization (default) or Person
    logo = "favicon-512x512.png" # Logo of Organization — favicon-512x512.png (default)
    name = "Alex Creio" # Name of Organization or Person
    sameAs = ["https://github.com/creio"] # E.g. ["https://github.com/thuliteio/thulite", "https://fosstodon.org/@thulite"]
    images = ["profile_logo.png"] # ["cover.png"] (default)
    article = [] # Article sections
    newsArticle = [] # NewsArticle sections
    blogPosting = ["posts"] # BlogPosting sections
    product = [] # Product sections

### imgs conf
[site_images]
  [site_images.defaults]
    decoding = "async" # sync, async, or auto (default)
    fetchpriority = "high" # high, low, or auto (default)
    loading = "lazy" # eager or lazy (default)
    widths = [480, 768, 940, 1024, 1366, 1600] # [640, 768, 1024, 1366, 1600, 1920] for example
    sizes = "auto" # 100vw (default), 75vw, or auto for example
    ## https://gohugo.io/content-management/image-processing/
    process = "resize 940x" # "fill 1600x900" or "fill 1280x720" for example
    lqip = "16x webp q20" # "16x webp q20" or "21x webp q20" for example
    profileImage = "profile.png" # put in `./assets/images/`
    defaultImage = "default-image.png" # put in `./assets/images/`
    imageAddClass = "img-fluid lazyload blur-up"


[sections]
  sectionNav = ["docs", "guides"]

[options]
  lazySizes = true
  clipBoard = true
  instantPage = true
  flexSearch = true
  searchSectionsShow = []
  searchSectionsIndex = []
  darkMode = true
  bootStrapJs = true
  highLight = true
  kaTex = false
  multilingualMode = false
  docsVersioning = false
  fullWidth = false
  navbarSticky = true
  toTopButton = true
  scrollSpy = false
  tawkEmbed = true

[shareButtons]
  networks = ["telegram", "vk", "facebook", "twitter", "email", "reddit"]
  size = "small"
  buttonMargin = "0.1em"
  icon = "solid"

[menu]
  [menu.section]
    auto = true
    collapsibleSidebar = true
